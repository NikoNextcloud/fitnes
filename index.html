<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IronForm — Фитнес Наръчник</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="0" y="11" width="6" height="6" rx="1.5" fill="#E8FF47"/>
          <rect x="22" y="11" width="6" height="6" rx="1.5" fill="#E8FF47"/>
          <rect x="5" y="8" width="4" height="12" rx="2" fill="#E8FF47"/>
          <rect x="19" y="8" width="4" height="12" rx="2" fill="#E8FF47"/>
          <rect x="9" y="12" width="10" height="4" rx="2" fill="white"/>
        </svg>
        <span>IronForm</span>
      </div>
      <nav class="nav" id="mainNav">
        <button class="nav-btn active" data-group="biceps">Бицепс</button>
        <button class="nav-btn" data-group="triceps">Трицепс</button>
        <button class="nav-btn" data-group="shoulders">Рамо</button>
        <button class="nav-btn" data-group="back">Гръб</button>
        <button class="nav-btn" data-group="legs">Крака</button>
        <button class="nav-btn" data-group="chest">Гърди</button>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="Меню">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <p class="hero-eyebrow">Твоят личен треньор</p>
      <h1 class="hero-title">Перфектна<br/><span class="accent">техника</span><br/>всеки път</h1>
      <p class="hero-sub">6 мускулни групи · 30+ упражнения · Анимирани демонстрации</p>
    </div>
    <div class="hero-figure">
      <div class="hero-animation">
        <svg class="hero-svg" viewBox="0 0 200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Тяло -->
          <circle cx="100" cy="40" r="22" fill="#E8FF47" class="hero-head"/>
          <!-- Торс -->
          <rect x="75" y="65" width="50" height="70" rx="10" fill="#E8FF47" class="hero-torso"/>
          <!-- Ляво рамо / мишница -->
          <rect class="hero-arm-l" x="48" y="68" width="14" height="40" rx="7" fill="#c8df30"/>
          <!-- Ляв лакът -->
          <rect class="hero-forearm-l" x="48" y="108" width="14" height="35" rx="7" fill="#b0c825" transform-origin="48 108"/>
          <!-- Дясно рамо / мишница -->
          <rect class="hero-arm-r" x="138" y="68" width="14" height="40" rx="7" fill="#c8df30"/>
          <!-- Десен лакът -->
          <rect class="hero-forearm-r" x="138" y="108" width="14" height="35" rx="7" fill="#b0c825" transform-origin="152 108"/>
          <!-- Ляво тегло -->
          <rect class="hero-weight-l" x="34" y="136" width="22" height="10" rx="5" fill="#E8FF47"/>
          <!-- Дясно тегло -->
          <rect class="hero-weight-r" x="144" y="136" width="22" height="10" rx="5" fill="#E8FF47"/>
          <!-- Таз -->
          <rect x="78" y="132" width="44" height="30" rx="8" fill="#c8df30"/>
          <!-- Ляв крак -->
          <rect x="80" y="160" width="18" height="60" rx="9" fill="#E8FF47"/>
          <!-- Десен крак -->
          <rect x="102" y="160" width="18" height="60" rx="9" fill="#E8FF47"/>
          <!-- Ляв крак долу -->
          <rect x="80" y="215" width="18" height="40" rx="9" fill="#c8df30"/>
          <!-- Десен крак долу -->
          <rect x="102" y="215" width="18" height="40" rx="9" fill="#c8df30"/>
          <!-- Обувки -->
          <rect x="74" y="250" width="28" height="12" rx="6" fill="#888"/>
          <rect x="98" y="250" width="28" height="12" rx="6" fill="#888"/>
        </svg>
      </div>
    </div>
  </section>

  <!-- МУСКУЛНА ГРУПА ХЕДЪР -->
  <section class="group-header" id="groupHeader">
    <div class="group-header-inner">
      <div class="group-icon-wrap" id="groupIconWrap">
        <!-- иконата се инжектира от JS -->
      </div>
      <div>
        <p class="group-label" id="groupLabel">Мускулна група</p>
        <h2 class="group-name" id="groupName">Бицепс</h2>
      </div>
      <div class="group-stats">
        <span class="gstat"><strong id="exCount">5</strong> упражнения</span>
        <span class="gstat"><strong id="musclesHit">2</strong> мускула</span>
      </div>
    </div>
  </section>

  <!-- УПРАЖНЕНИЯ ГРИД -->
  <main class="exercises-grid" id="exercisesGrid">
    <!-- Попълва се от JS -->
  </main>

  <!-- МОДАЛЕН ПРОЗОРЕЦ -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-inner">
        <div class="modal-animation-wrap">
          <canvas class="exercise-canvas" id="exerciseCanvas" width="320" height="280"></canvas>
          <div class="rep-counter">
            <span id="repNum">0</span>
            <small>повторения</small>
          </div>
        </div>
        <div class="modal-info">
          <span class="modal-tag" id="modalTag">Бицепс</span>
          <h3 class="modal-title" id="modalTitle">Упражнение</h3>
          <div class="modal-desc" id="modalDesc"></div>
          <div class="modal-muscles" id="modalMuscles"></div>
          <div class="modal-tips" id="modalTips"></div>
          <div class="modal-sets">
            <div class="set-item">
              <span>Серии</span>
              <strong id="modalSets">3–4</strong>
            </div>
            <div class="set-item">
              <span>Повторения</span>
              <strong id="modalReps">8–12</strong>
            </div>
            <div class="set-item">
              <span>Почивка</span>
              <strong id="modalRest">60 сек</strong>
            </div>
          </div>
          <button class="btn-start" id="btnStart">▶ Стартирай демо</button>
          <button class="btn-stop hidden" id="btnStop">◼ Спри</button>
        </div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
